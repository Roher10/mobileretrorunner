document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt(circle,rgba(0,240,255,.55),rgba(0,240,255,.16));\">\n            <span style=\"font-size:22px;line-height:1;\">▲<\u002Fspan>JUMP\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- HOME -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 28px;background:radial-gradient(circle at 50% 38%,rgba(8,2,20,.4),rgba(6,2,14,.9));\">\n          <div style=\"font-family:'Press Start 2P';font-size:9px;color:#ffe14d;letter-spacing:3px;text-shadow:0 0 10px rgba(255,225,77,.6);\">◆ ENDLESS RUNNER ◆<\u002Fdiv>\n          <div style=\"font-family:'Press Start 2P';font-size:30px;line-height:1.18;color:#7df9ff;text-align:center;text-shadow:0 0 8px #00f0ff,0 0 22px rgba(0,240,255,.7);\">NEON<br>DASH<\u002Fdiv>\n          <div style=\"font-family:'Press Start 2P';font-size:8px;color:#ff6fc0;letter-spacing:2px;animation:pd-glow 2.4s ease-in-out infinite;\">BEST&nbsp;&nbsp;<span style=\"color:#fff;\">{{ bestText }}<\u002Fspan><\u002Fdiv>\n          <button onclick=\"{{ onPlay }}\" style=\"margin-top:10px;font-family:'Press Start 2P';font-size:14px;color:#07020f;background:#7df9ff;border:0;padding:16px 40px;cursor:pointer;letter-spacing:2px;box-shadow:0 5px 0 #2a8fa6,0 0 24px rgba(0,240,255,.45);\" style-active=\"transform:translateY(5px);box-shadow:0 0 0 #2a8fa6,0 0 24px rgba(0,240,255,.45);\">PLAY<\u002Fbutton>\n          <button onclick=\"{{ onShowScores }}\" style=\"font-family:'Press Start 2P';font-size:9px;color:#ffe14d;background:transparent;border:2px solid #ffe14d;padding:11px 20px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 16px rgba(255,225,77,.25);\" style-active=\"transform:translateY(3px);\">HIGH SCORES<\u002Fbutton>\n          <div style=\"margin-top:8px;font-family:'Press Start 2P';font-size:7px;color:#8a86b8;line-height:2.2;text-align:center;letter-spacing:1px;\">TAP TOP TO JUMP<br>TAP BOTTOM TO SLIDE<\u002Fdiv>\n          <div style=\"font-family:'Press Start 2P';font-size:8px;color:#fff;animation:pd-blink 1.1s step-end infinite;letter-spacing:1px;\">▸ INSERT COIN ◂<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- GAME OVER -->\n      <sc-if value=\"{{ isGameover }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:36px 26px;background:radial-gradient(circle at 50% 40%,rgba(40,4,20,.5),rgba(6,2,14,.93));\">\n          <div style=\"font-family:'Press Start 2P';font-size:21px;color:#ff2e97;text-align:center;line-height:1.3;text-shadow:0 0 10px #ff2e97,0 0 26px rgba(255,46,151,.6);\">GAME<br>OVER<\u002Fdiv>\n\n          <sc-if value=\"{{ isNewHigh }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-family:'Press Start 2P';font-size:9px;color:#ffe14d;letter-spacing:1px;animation:pd-glow 1.6s ease-in-out infinite;text-shadow:0 0 10px #ffe14d;\">★ NEW HIGH SCORE ★<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"display:flex;gap:26px;font-family:'Press Start 2P';font-size:8px;color:#8a86b8;text-align:center;line-height:2.1;\">\n            <div>SCORE<br><span style=\"color:#7df9ff;font-size:13px;text-shadow:0 0 8px rgba(0,240,255,.6);\">{{ scoreText }}<\u002Fspan><\u002Fdiv>\n            <div>COINS<br><span style=\"color:#ffe14d;font-size:13px;\">{{ coinsText }}<\u002Fspan><\u002Fdiv>\n            <div>DIST<br><span style=\"color:#ff6fc0;font-size:13px;\">{{ distText }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ enteringInitials }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:4px;\">\n              <div style=\"font-family:'Press Start 2P';font-size:8px;color:#fff;letter-spacing:1px;\">ENTER INITIALS<\u002Fdiv>\n              <div style=\"display:flex;gap:16px;\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\">\n                  <button onclick=\"{{ onUp0 }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#7df9ff;background:transparent;border:0;cursor:pointer;\">▲<\u002Fbutton>\n                  <div style=\"font-family:'Press Start 2P';font-size:24px;color:#fff;width:30px;text-align:center;text-shadow:0 0 10px #00f0ff;\">{{ l0 }}<\u002Fdiv>\n                  <button onclick=\"{{ onDown0 }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#7df9ff;background:transparent;border:0;cursor:pointer;\">▼<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\">\n                  <button onclick=\"{{ onUp1 }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#7df9ff;background:transparent;border:0;cursor:pointer;\">▲<\u002Fbutton>\n                  <div style=\"font-family:'Press Start 2P';font-size:24px;color:#fff;width:30px;text-align:center;text-shadow:0 0 10px #00f0ff;\">{{ l1 }}<\u002Fdiv>\n                  <button onclick=\"{{ onDown1 }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#7df9ff;background:transparent;border:0;cursor:pointer;\">▼<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\">\n                  <button onclick=\"{{ onUp2 }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#7df9ff;background:transparent;border:0;cursor:pointer;\">▲<\u002Fbutton>\n                  <div style=\"font-family:'Press Start 2P';font-size:24px;color:#fff;width:30px;text-align:center;text-shadow:0 0 10px #00f0ff;\">{{ l2 }}<\u002Fdiv>\n                  <button onclick=\"{{ onDown2 }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#7df9ff;background:transparent;border:0;cursor:pointer;\">▼<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ onDone }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#07020f;background:#ffe14d;border:0;padding:12px 30px;cursor:pointer;letter-spacing:2px;box-shadow:0 5px 0 #b89a1f;\" style-active=\"transform:translateY(5px);box-shadow:0 0 0 #b89a1f;\">DONE<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ notEntering }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:11px;margin-top:4px;\">\n              <sc-if value=\"{{ hasRank }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-family:'Press Start 2P';font-size:9px;color:#ffe14d;letter-spacing:1px;\">RANK&nbsp;{{ rankText }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;gap:12px;\">\n                <button onclick=\"{{ onRetry }}\" style=\"font-family:'Press Start 2P';font-size:11px;color:#07020f;background:#7df9ff;border:0;padding:13px 22px;cursor:pointer;letter-spacing:1px;box-shadow:0 5px 0 #2a8fa6;\" style-active=\"transform:translateY(5px);box-shadow:0 0 0 #2a8fa6;\">RETRY<\u002Fbutton>\n                <button onclick=\"{{ onShowScores }}\" style=\"font-family:'Press Start 2P';font-size:9px;color:#ffe14d;background:transparent;border:2px solid #ffe14d;padding:11px 16px;cursor:pointer;letter-spacing:1px;\" style-active=\"transform:translateY(3px);\">SCORES<\u002Fbutton>\n                <button onclick=\"{{ onHome }}\" style=\"font-family:'Press Start 2P';font-size:9px;color:#ff6fc0;background:transparent;border:2px solid #ff6fc0;padding:11px 16px;cursor:pointer;letter-spacing:1px;\" style-active=\"transform:translateY(3px);\">HOME<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SCORES -->\n      <sc-if value=\"{{ isScores }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 26px;background:radial-gradient(circle at 50% 30%,rgba(8,2,20,.5),rgba(6,2,14,.94));\">\n          <div style=\"font-family:'Press Start 2P';font-size:15px;color:#ffe14d;letter-spacing:1px;text-shadow:0 0 10px rgba(255,225,77,.6);margin-bottom:4px;\">HIGH SCORES<\u002Fdiv>\n          <div style=\"width:100%;display:flex;flex-direction:column;gap:3px;\">\n            <sc-for list=\"{{ scoresView }}\" as=\"row\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(125,249,255,.05);border-left:3px solid {{ row.color }};font-family:'Press Start 2P';font-size:10px;\">\n                <span style=\"color:#8a86b8;width:26px;\">{{ row.rankText }}<\u002Fspan>\n                <span style=\"color:{{ row.color }};letter-spacing:2px;flex:1;text-align:left;padding-left:12px;\">{{ row.name }}<\u002Fspan>\n                <span style=\"color:#fff;\">{{ row.score }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ onBack }}\" style=\"margin-top:auto;font-family:'Press Start 2P';font-size:10px;color:#07020f;background:#7df9ff;border:0;padding:13px 30px;cursor:pointer;letter-spacing:2px;box-shadow:0 5px 0 #2a8fa6;\" style-active=\"transform:translateY(5px);box-shadow:0 0 0 #2a8fa6;\">◂ BACK<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-family:'Press Start 2P';font-size:8px;color:#5a5478;letter-spacing:2px;\">★ NEON DASH · ARCADE PROTOTYPE ★<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 460, &quot;height&quot;: 860 },\n  &quot;difficulty&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Normal&quot;, &quot;options&quot;: [&quot;Chill&quot;, &quot;Normal&quot;, &quot;Hard&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;theme&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Synthwave&quot;, &quot;options&quot;: [&quot;Synthwave&quot;, &quot;Acid&quot;, &quot;Ice&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;scanlines&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home', score: 0, coins: 0, dist: 0, best: 0,\n    scores: [], isNewHigh: false, enteringInitials: false,\n    initials: [0, 0, 0], rank: 0, showHint: false\n  };\n\n  LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';\n  CW = 200; CH = 360; groundY = 248;\n  GRAV = 0.62; JUMP = -9.2; PH = 20; SH = 10;\n  tick = 0; gridOffset = 0; gridScroll = 0; acc = 0; playedOnce = false;\n  lastEntry = null; scoreEl = null; coinEl = null;\n\n  componentDidMount() {\n    this.loadAll();\n    const cv = document.getElementById('pd-canvas');\n    this.canvas = cv;\n    this.ctx = cv.getContext('2d');\n    this.ctx.imageSmoothingEnabled = false;\n    // stars\n    this.stars = [];\n    for (let i = 0; i < 46; i++) {\n      this.stars.push({ x: Math.random() * this.CW, y: Math.random() * (this.groundY - 56), s: Math.random() < 0.25 ? 2 : 1, ph: Math.random() * 6.3 });\n    }\n    this.handlePointer = this.handlePointer.bind(this);\n    this.handleKey = this.handleKey.bind(this);\n    cv.addEventListener('pointerdown', this.handlePointer);\n    window.addEventListener('keydown', this.handleKey);\n    this.last = performance.now();\n    this.loop = this.loop.bind(this);\n    this._raf = requestAnimationFrame(this.loop);\n  }\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    if (this.canvas) this.canvas.removeEventListener('pointerdown', this.handlePointer);\n    window.removeEventListener('keydown', this.handleKey);\n  }\n\n  // ---------- storage ----------\n  loadAll() {\n    let scores = null, best = 0;\n    try { scores = JSON.parse(localStorage.getItem('neondash.scores.v1')); } catch (e) {}\n    try { best = parseInt(localStorage.getItem('neondash.best.v1')) || 0; } catch (e) {}\n    if (!Array.isArray(scores) || !scores.length) {\n      scores = [{ name: 'NEO', score: 8400 }, { name: 'AYA', score: 6250 }, { name: 'JET', score: 4800 }, { name: 'ZED', score: 3300 }, { name: 'KAI', score: 2100 }, { name: 'RIO', score: 1200 }];\n    }\n    this.state.scores = scores;\n    this.state.best = Math.max(best, scores[0] ? scores[0].score : 0);\n  }\n  saveScores(arr) {\n    try { localStorage.setItem('neondash.scores.v1', JSON.stringify(arr)); } catch (e) {}\n  }\n  saveBest(b) { try { localStorage.setItem('neondash.best.v1', String(b)); } catch (e) {} }\n\n  // ---------- config (tweaks) ----------\n  diffCfg() {\n    const d = this.props.difficulty || 'Normal';\n    if (d === 'Chill') return { base: 1.8, ramp: 0.00045, cap: 5.0, spMin: 96, spVar: 74, high: 0.30 };\n    if (d === 'Hard') return { base: 2.9, ramp: 0.00092, cap: 7.3, spMin: 70, spVar: 58, high: 0.46 };\n    return { base: 2.2, ramp: 0.0006, cap: 6.3, spMin: 82, spVar: 72, high: 0.38 };\n  }\n  theme() {\n    const t = this.props.theme || 'Synthwave';\n    if (t === 'Acid') return { player: '#b6ff3a', glow: '#b6ff3a', low: '#ff3df0', high: '#39ff14', grid: '#39ff14' };\n    if (t === 'Ice') return { player: '#9be7ff', glow: '#9be7ff', low: '#5d7bff', high: '#eafaff', grid: '#4aa8ff' };\n    return { player: '#00f0ff', glow: '#00f0ff', low: '#ff2e97', high: '#ffe14d', grid: '#ff2e97' };\n  }\n\n  // ---------- audio ----------\n  ensureAudio() {\n    if (!this.actx) { try { this.actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }\n    if (this.actx && this.actx.state === 'suspended') this.actx.resume();\n  }\n  blip(freq, dur, type) {\n    if (!this.actx) return;\n    const t = this.actx.currentTime, o = this.actx.createOscillator(), g = this.actx.createGain();\n    o.type = type || 'square'; o.frequency.setValueAtTime(freq, t);\n    g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);\n    o.connect(g); g.connect(this.actx.destination); o.start(t); o.stop(t + dur);\n  }\n  deathSound() {\n    this.blip(330, 0.12, 'square');\n    setTimeout(() => this.blip(220, 0.16, 'square'), 90);\n    setTimeout(() => this.blip(130, 0.24, 'sawtooth'), 200);\n  }\n\n  // ---------- input ----------\n  handlePointer(e) {\n    this.ensureAudio();\n    if (this.state.screen !== 'playing') return;\n    const r = e.currentTarget.getBoundingClientRect();\n    const y = e.clientY - r.top;\n    if (y > r.height * 0.62) this.doSlide(); else this.doJump();\n  }\n  handleKey(e) {\n    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {\n      this.ensureAudio();\n      if (this.state.screen === 'playing') { e.preventDefault(); this.doJump(); }\n      else if (this.state.screen === 'home') this.startGame();\n    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {\n      if (this.state.screen === 'playing') { e.preventDefault(); this.doSlide(); }\n    } else if (e.code === 'Enter') {\n      if (this.state.screen === 'home') this.startGame();\n    }\n  }\n  doJump() {\n    const p = this.world && this.world.player; if (!p) return;\n    if (p.grounded) {\n      if (p.sliding) { p.sliding = false; p.y = this.groundY - this.PH; } // jump straight out of a slide\n      p.vy = this.JUMP; p.grounded = false; p.jumpBuf = 0; p.slideBuf = 0; this.blip(620, 0.1);\n    } else {\n      p.jumpBuf = 9; // buffer: fire the instant we land\n    }\n  }\n  doSlide() {\n    const p = this.world && this.world.player; if (!p) return;\n    if (p.grounded) {\n      p.sliding = true; p.slideT = 34; p.y = this.groundY - this.SH; p.slideBuf = 0; p.jumpBuf = 0; this.blip(300, 0.08, 'sawtooth');\n    } else {\n      if (p.vy < 6) p.vy = 6; // fast-drop out of a jump\n      p.slideBuf = 12; // buffer the slide for landing\n    }\n  }\n\n  // ---------- game flow ----------\n  startGame() {\n    this.ensureAudio();\n    const cfg = this.diffCfg();\n    this.world = {\n      player: { x: 46, y: this.groundY - this.PH, w: 16, vy: 0, grounded: true, sliding: false, slideT: 0, jumpBuf: 0, slideBuf: 0 },\n      obstacles: [], coins: [], speed: cfg.base, dist: 0, gold: 0, spawnT: 55\n    };\n    this.scoreEl = null; this.coinEl = null;\n    this.setState({ screen: 'playing', score: 0, coins: 0, dist: 0, showHint: true });\n    clearTimeout(this._hintT);\n    this._hintT = setTimeout(() => { if (this.state.screen === 'playing') this.setState({ showHint: false }); }, 2600);\n  }\n  spawnCoins() {\n    const w = this.world, bx = this.CW + 30 + Math.random() * 28, cy = this.groundY - 30;\n    const n = 3 + Math.floor(Math.random() * 2);\n    for (let i = 0; i < n; i++) {\n      w.coins.push({ x: bx + i * 12, y: cy - Math.sin((i / (n - 1)) * Math.PI) * 12, ph: Math.random() * 6, taken: false });\n    }\n  }\n  gameUpdate() {\n    const w = this.world; if (!w) return;\n    const cfg = this.diffCfg();\n    const p = w.player;\n    w.speed = Math.min(cfg.cap, cfg.base + w.dist * cfg.ramp);\n    w.dist += w.speed;\n    // physics\n    const prevGrounded = p.grounded;\n    p.vy += this.GRAV; p.y += p.vy;\n    const curH = p.sliding ? this.SH : this.PH;\n    const floorTop = this.groundY - curH;\n    if (p.y >= floorTop) {\n      p.y = floorTop; p.vy = 0; p.grounded = true;\n      if (!prevGrounded) { // just landed — flush buffered input\n        if (p.jumpBuf > 0) {\n          p.jumpBuf = 0; if (p.sliding) { p.sliding = false; p.y = this.groundY - this.PH; }\n          p.vy = this.JUMP; p.grounded = false; this.blip(620, 0.1);\n        } else if (p.slideBuf > 0) {\n          p.slideBuf = 0; p.sliding = true; p.slideT = 34; p.y = this.groundY - this.SH; this.blip(300, 0.08, 'sawtooth');\n        }\n      }\n    } else p.grounded = false;\n    if (p.sliding) { p.slideT--; if (p.slideT <= 0) { p.sliding = false; p.y = this.groundY - this.PH; } }\n    if (p.jumpBuf > 0) p.jumpBuf--;\n    if (p.slideBuf > 0) p.slideBuf--;\n    // spawn\n    w.spawnT -= 1;\n    if (w.spawnT <= 0) {\n      if (Math.random() < cfg.high) w.obstacles.push({ type: 'high', x: this.CW + 8, y: this.groundY - 50, w: 12, h: 38 });\n      else w.obstacles.push({ type: 'low', x: this.CW + 8, y: this.groundY - 18, w: 11 + Math.floor(Math.random() * 9), h: 18 });\n      w.spawnT = (cfg.spMin + Math.random() * cfg.spVar) / w.speed;\n      if (Math.random() < 0.55) this.spawnCoins();\n    }\n    const px = p.x, pw = p.w, py = p.y, ph = curH;\n    // obstacles\n    for (let i = w.obstacles.length - 1; i >= 0; i--) {\n      const o = w.obstacles[i]; o.x -= w.speed;\n      if (o.x + o.w < -4) { w.obstacles.splice(i, 1); continue; }\n      if (px < o.x + o.w && px + pw > o.x && py < o.y + o.h && py + ph > o.y) { this.gameOver(); return; }\n    }\n    // coins\n    for (let i = w.coins.length - 1; i >= 0; i--) {\n      const c = w.coins[i]; c.x -= w.speed;\n      if (c.x < -6) { w.coins.splice(i, 1); continue; }\n      if (!c.taken && Math.abs(c.x - (px + pw / 2)) < 8 && Math.abs(c.y - (py + ph / 2)) < 11) {\n        c.taken = true; w.gold++; this.blip(1040, 0.07); w.coins.splice(i, 1);\n      }\n    }\n    // HUD\n    if (!this.scoreEl) this.scoreEl = document.getElementById('pd-score');\n    if (!this.coinEl) this.coinEl = document.getElementById('pd-coins');\n    const sc = Math.floor(w.dist / 8) + w.gold * 10;\n    if (this.scoreEl) this.scoreEl.textContent = this.pad(sc);\n    if (this.coinEl) this.coinEl.textContent = String(w.gold);\n  }\n  gameOver() {\n    const w = this.world;\n    const sc = Math.floor(w.dist / 8) + w.gold * 10;\n    const best = Math.max(this.state.best, sc);\n    const arr = this.state.scores;\n    const qual = sc > 0 && (arr.length < 8 || sc > arr[arr.length - 1].score);\n    this.deathSound();\n    this.lastEntry = null;\n    this.saveBest(best);\n    this.setState({ screen: 'gameover', score: sc, coins: w.gold, dist: Math.floor(w.dist / 10), best, isNewHigh: qual, enteringInitials: qual, initials: [0, 0, 0], rank: 0 });\n  }\n  chg(i, d) {\n    const a = this.state.initials.slice();\n    a[i] = (a[i] + d + 26) % 26;\n    this.blip(880, 0.04);\n    this.setState({ initials: a });\n  }\n  submitScore() {\n    const L = this.LETTERS, ini = this.state.initials;\n    const name = L[ini[0]] + L[ini[1]] + L[ini[2]];\n    const entry = { name, score: this.state.score };\n    this.lastEntry = entry;\n    let arr = this.state.scores.slice();\n    arr.push(entry); arr.sort((a, b) => b.score - a.score); arr = arr.slice(0, 8);\n    const rank = arr.indexOf(entry) + 1;\n    this.saveScores(arr);\n    this.blip(1320, 0.1);\n    this.setState({ scores: arr, enteringInitials: false, rank });\n  }\n\n  // ---------- loop + render ----------\n  loop(now) {\n    let dt = now - this.last; this.last = now;\n    if (dt > 100) dt = 100;\n    this.acc += dt;\n    let steps = 0;\n    while (this.acc >= 16.6667 && steps < 5) {\n      if (this.state.screen === 'playing') this.gameUpdate();\n      this.acc -= 16.6667; steps++;\n    }\n    this.draw();\n    this._raf = requestAnimationFrame(this.loop);\n  }\n  pad(n) { return String(Math.max(0, Math.floor(n))).padStart(6, '0'); }\n\n  draw() {\n    const ctx = this.ctx; if (!ctx) return;\n    this.tick++;\n    const playing = this.state.screen === 'playing';\n    const sp = playing && this.world ? this.world.speed : 2.6;\n    this.gridOffset += sp * 0.03; this.gridScroll += sp * 0.6;\n    ctx.clearRect(0, 0, this.CW, this.CH);\n    this.drawSky(); this.drawStars(); this.drawSun(); this.drawRidge(); this.drawGrid();\n    if (playing && this.world) {\n      for (const c of this.world.coins) this.drawCoin(c);\n      for (const o of this.world.obstacles) this.drawObstacle(o);\n      const p = this.world.player, curH = p.sliding ? this.SH : this.PH;\n      const mode = !p.grounded ? 'jump' : (p.sliding ? 'slide' : 'run');\n      this.drawPlayer(p.x, p.y, p.w, curH, mode);\n    } else {\n      this.drawPlayer(46, this.groundY - this.PH, 16, this.PH, 'run');\n    }\n  }\n  drawSky() {\n    const ctx = this.ctx, g = ctx.createLinearGradient(0, 0, 0, this.groundY);\n    g.addColorStop(0, '#08010f'); g.addColorStop(0.55, '#27093f'); g.addColorStop(1, '#5a1c63');\n    ctx.fillStyle = g; ctx.fillRect(0, 0, this.CW, this.groundY);\n  }\n  drawStars() {\n    const ctx = this.ctx; ctx.fillStyle = '#ffffff';\n    for (const s of this.stars) {\n      ctx.globalAlpha = 0.35 + 0.55 * Math.abs(Math.sin(this.tick * 0.04 + s.ph));\n      ctx.fillRect(s.x | 0, s.y | 0, s.s, s.s);\n    }\n    ctx.globalAlpha = 1;\n  }\n  drawSun() {\n    const ctx = this.ctx, cx = this.CW / 2, cy = this.groundY - 4, r = 34;\n    const g = ctx.createLinearGradient(0, cy - r, 0, cy + r * 0.3);\n    g.addColorStop(0, '#fff39a'); g.addColorStop(0.5, '#ff7aa8'); g.addColorStop(1, '#e23b86');\n    ctx.save(); ctx.shadowColor = '#ff5d8f'; ctx.shadowBlur = 22; ctx.fillStyle = g;\n    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); ctx.restore();\n    ctx.fillStyle = '#27093f';\n    for (let i = 0; i < 7; i++) { ctx.fillRect(cx - r, cy - r * 0.04 + i * 2.9, r * 2, 0.8 + i * 0.55); }\n  }\n  drawRidge() {\n    const ctx = this.ctx, gy = this.groundY; ctx.fillStyle = '#190a30';\n    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(0, gy - 13); ctx.lineTo(26, gy - 25); ctx.lineTo(50, gy - 11); ctx.lineTo(70, gy - 20); ctx.lineTo(88, gy - 9); ctx.lineTo(88, gy); ctx.closePath(); ctx.fill();\n    ctx.beginPath(); ctx.moveTo(this.CW, gy); ctx.lineTo(this.CW, gy - 15); ctx.lineTo(this.CW - 28, gy - 27); ctx.lineTo(this.CW - 50, gy - 13); ctx.lineTo(this.CW - 72, gy - 21); ctx.lineTo(this.CW - 90, gy - 9); ctx.lineTo(this.CW - 90, gy); ctx.closePath(); ctx.fill();\n  }\n  drawGrid() {\n    const ctx = this.ctx, CW = this.CW, CH = this.CH, hy = this.groundY, th = this.theme();\n    ctx.fillStyle = '#0a0420'; ctx.fillRect(0, hy, CW, CH - hy);\n    ctx.save();\n    ctx.strokeStyle = th.grid; ctx.lineWidth = 1; ctx.shadowColor = th.grid; ctx.shadowBlur = 5;\n    const vp = CW / 2, frac = this.gridOffset % 1;\n    for (let i = 0; i < 11; i++) {\n      const t = (i + frac) / 11;\n      const y = hy + (CH - hy) * Math.pow(t, 1.8);\n      ctx.globalAlpha = 0.25 + 0.55 * t;\n      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();\n    }\n    ctx.globalAlpha = 0.6;\n    const spacing = 22, vo = this.gridScroll % spacing;\n    for (let gx = -CW; gx <= CW * 2; gx += spacing) {\n      const bx = gx - vo;\n      ctx.beginPath(); ctx.moveTo(vp, hy); ctx.lineTo(bx, CH); ctx.stroke();\n    }\n    ctx.restore();\n  }\n  drawObstacle(o) {\n    const ctx = this.ctx, th = this.theme();\n    ctx.save();\n    if (o.type === 'high') {\n      ctx.strokeStyle = th.high; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;\n      ctx.beginPath(); ctx.moveTo(o.x + o.w / 2, 0); ctx.lineTo(o.x + o.w / 2, o.y); ctx.stroke();\n      ctx.globalAlpha = 1; ctx.shadowColor = th.high; ctx.shadowBlur = 8; ctx.fillStyle = th.high;\n      ctx.fillRect(o.x, o.y, o.w, o.h);\n      ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,.6)'; ctx.fillRect(o.x, o.y + o.h - 2, o.w, 2);\n    } else {\n      ctx.shadowColor = th.low; ctx.shadowBlur = 8; ctx.fillStyle = th.low;\n      ctx.fillRect(o.x, o.y, o.w, o.h);\n      ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.fillRect(o.x, o.y, o.w, 2);\n    }\n    ctx.restore();\n  }\n  drawCoin(c) {\n    const ctx = this.ctx, r = 5, s = 0.35 + 0.65 * Math.abs(Math.cos(this.tick * 0.12 + c.ph));\n    ctx.save(); ctx.translate(c.x, c.y); ctx.shadowColor = '#ffd23f'; ctx.shadowBlur = 9; ctx.fillStyle = '#ffd23f';\n    ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r * s, 0); ctx.lineTo(0, r); ctx.lineTo(-r * s, 0); ctx.closePath(); ctx.fill();\n    ctx.shadowBlur = 0; ctx.fillStyle = '#fff4c0'; ctx.fillRect(-1, -2, 2, 1);\n    ctx.restore();\n  }\n  drawPlayer(px, py, w, h, mode) {\n    const ctx = this.ctx, th = this.theme();\n    ctx.save();\n    ctx.shadowColor = th.glow; ctx.shadowBlur = 9; ctx.fillStyle = th.player;\n    ctx.fillRect(px, py, w, h - 4);\n    // visor\n    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(6,18,40,.85)';\n    ctx.fillRect(px + 3, py + 3, w - 6, mode === 'slide' ? 3 : 5);\n    // eye\n    ctx.fillStyle = '#ffffff'; ctx.fillRect(px + w - 6, py + (mode === 'slide' ? 3 : 5), 3, 3);\n    // antenna\n    ctx.shadowColor = th.low; ctx.shadowBlur = 6; ctx.fillStyle = th.low;\n    ctx.fillRect(px + w - 4, py - 4, 2, 4); ctx.fillRect(px + w - 5, py - 6, 4, 2);\n    ctx.shadowBlur = 0; ctx.fillStyle = th.player;\n    const by = py + h - 4;\n    if (mode === 'run') {\n      const f = Math.floor(this.tick / 4) % 2;\n      if (f === 0) { ctx.fillRect(px + 2, by, 4, 4); ctx.fillRect(px + w - 8, by, 4, 2); }\n      else { ctx.fillRect(px + 2, by, 4, 2); ctx.fillRect(px + w - 8, by, 4, 4); }\n    } else if (mode === 'jump') {\n      ctx.fillRect(px + 2, by, 4, 3); ctx.fillRect(px + w - 8, by, 4, 3);\n    }\n    ctx.restore();\n  }\n\n  renderVals() {\n    const S = this.state, L = this.LETTERS;\n    return {\n      isHome: S.screen === 'home', isPlaying: S.screen === 'playing',\n      isGameover: S.screen === 'gameover', isScores: S.screen === 'scores',\n      showHint: S.showHint, enteringInitials: S.enteringInitials, notEntering: !S.enteringInitials,\n      hasRank: S.rank > 0,\n      scanlinesOn: this.props.scanlines !== false,\n      scoreText: this.pad(S.score), coinsText: String(S.coins), distText: String(S.dist) + 'm',\n      bestText: this.pad(S.best), isNewHigh: S.isNewHigh, rankText: '#' + S.rank,\n      l0: L[S.initials[0]], l1: L[S.initials[1]], l2: L[S.initials[2]],\n      scoresView: S.scores.map((s, i) => ({\n        rankText: String(i + 1).padStart(2, '0'), name: s.name, score: this.pad(s.score),\n        color: s === this.lastEntry ? '#ffe14d' : '#7df9ff'\n      })),\n      onJumpBtn: (e) => { if (e && e.preventDefault) e.preventDefault(); this.ensureAudio(); this.doJump(); },\n      onSlideBtn: (e) => { if (e && e.preventDefault) e.preventDefault(); this.ensureAudio(); this.doSlide(); },\n      onPlay: () => this.startGame(),\n      onShowScores: () => this.setState({ screen: 'scores' }),\n      onBack: () => this.setState({ screen: S.score >= 0 && this.lastEntry ? 'gameover' : 'home' }),\n      onRetry: () => this.startGame(),\n      onHome: () => { this.lastEntry = null; this.setState({ screen: 'home' }); },\n      onUp0: () => this.chg(0, 1), onDown0: () => this.chg(0, -1),\n      onUp1: () => this.chg(1, 1), onDown1: () => this.chg(1, -1),\n      onUp2: () => this.chg(2, 1), onDown2: () => this.chg(2, -1),\n      onDone: () => this.submitScore()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
